name: CouncilApp
options:
  bundleIdPrefix: com.council
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
packages:
  Council:
    path: ../Council
targets:
  CouncilApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/CouncilApp
    resources:
      - Resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSSpeechRecognitionUsageDescription: Council uses on-device speech recognition to transcribe your spoken questions without sending audio to remote servers.
    entitlements:
      path: Resources/CouncilApp.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
    dependencies:
      - package: Council
        product: CouncilUI
      - package: Council
        product: CouncilCore
      - package: Council
        product: CouncilAgents
      - package: Council
        product: CouncilMemory
      - package: Council
        product: CouncilInference
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.council.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
